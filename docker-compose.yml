services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-supplyforge}
      POSTGRES_USER: ${POSTGRES_USER:-supplyforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supplyforge}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-supplyforge} -d ${POSTGRES_DB:-supplyforge}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-supplyforge}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-supplyforge}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-supplyforge}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
        NEXT_PUBLIC_WORKSPACE_ID: ${NEXT_PUBLIC_WORKSPACE_ID:-1}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      NEXT_PUBLIC_WORKSPACE_ID: ${NEXT_PUBLIC_WORKSPACE_ID:-1}
    depends_on:
      - backend

volumes:
  pgdata:
