spring:
  application:
    name: supplyforge-ai
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/supplyforge}
    username: ${SPRING_DATASOURCE_USERNAME:supplyforge}
    password: ${SPRING_DATASOURCE_PASSWORD:supplyforge}
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL:8}
      minimum-idle: ${HIKARI_MIN_IDLE:2}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
  servlet:
    multipart:
      max-file-size: 80MB
      max-request-size: 85MB

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

supplyforge:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-flash-latest}
    base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
    connect-timeout-seconds: 10
    read-timeout-seconds: 120
  finance:
    # Tỷ lệ chi phí lưu kho mỗi năm (mặc định ngành chung: 25%)
    # Có thể đổi theo ngành: Thời trang = 0.35, Điện tử = 0.20
    storage-cost-yearly-rate: 0.25
    # Tỷ lệ khấu hao lỗi thời mỗi năm (mặc định: 10%)
    depreciation-cost-yearly-rate: 0.10
    # Thuế TNDN (mặc định Việt Nam: 20%)
    tax-rate: 0.20
    # Chi phí marketing & vận chuyển ước tính khi xả hàng (% doanh thu)
    marketing-cost-rate: 0.08
    # Ngưỡng phân loại "Hàng giá trị cao" (VND/lô): 10 triệu
    high-value-threshold: 10000000
    # Ngưỡng phân loại "Hàng giá trị trung bình" (VND/lô): 1 triệu
    mid-value-threshold: 1000000
  aging:
    # Ngưỡng phân loại (ngày) — Healthy / Watchlist / SlowMoving / DeadStock
    healthy-max-days: 30
    watchlist-max-days: 60
    slow-moving-max-days: 90

logging:
  level:
    root: INFO
